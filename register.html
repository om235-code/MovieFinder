<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieFinder - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page auth-page">
    <div class="auth-card">
      <h1>Register</h1>

      <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Password:</label>
        <input type="password" placeholder="Create a password">

        <label>Confirm Password:</label>
        <input type="password" placeholder="Confirm your password">

        <button type="submit" class="main-btn">Create Account</button>
      </form>

      <p class="bottom-text"><a href="login.html">Already have an account? Login</a></p>
      <p class="bottom-text"><a href="index.html">Back to Home</a></p>
    </div>
  </div>
</body>
</html>
