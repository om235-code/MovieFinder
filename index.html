<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieFinder - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page home-page">
    <div class="card home-card">

      <div class="top-bar">
        <h2 class="brand">MovieFinder</h2>
        <div class="nav-buttons">
          <a href="index.html" class="small-btn active-btn">Home</a>
          <a href="login.html" class="small-btn">Login</a>
          <a href="register.html" class="small-btn">Register</a>
          <button id="logoutBtn" class="small-btn" style="display:none;">Logout</button>
        </div>
      </div>

      <div class="hero">
        <h1>MovieFinder</h1>
        <p>Search movies, save favorites</p>
        <p id="welcomeUser" style="margin-top:10px; font-weight:bold;"></p>
      </div>

      <div class="search-box">
        <input id="movieSearch" type="text" placeholder="Search for a movie...">
        <button id="searchBtn" class="main-btn" type="button">Search</button>
      </div>

      <p id="searchMessage" style="margin-top:15px; text-align:center;"></p>

    </div>
  </div>

  <script>
    const user = localStorage.getItem("loggedInUser");
    const welcomeUser = document.getElementById("welcomeUser");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("movieSearch");
    const searchMessage = document.getElementById("searchMessage");

    // Protect home page
    if (!user) {
      window.location.href = "login.html";
    } else {
      welcomeUser.textContent = "Logged in as: " + user;
      logoutBtn.style.display = "inline-block";
    }

    // Logout
    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem("loggedInUser");
      alert("Logged out successfully");
      window.location.href = "login.html";
    });

    // Placeholder search for demo
    searchBtn.addEventListener("click", function () {
      const query = searchInput.value.trim();

      if (query === "") {
        searchMessage.textContent = "Please enter a movie name.";
      } else {
        searchMessage.textContent = 'Search ready for: "' + query + '"';
      }
    });
  </script>
</body>
</html>
